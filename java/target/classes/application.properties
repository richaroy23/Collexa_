spring.application.name=collexa-api
server.port=8080

# MongoDB – reads MONGO_URI from .env (set to Atlas SRV URI for production)
# Atlas URI format: mongodb+srv://<user>:<pass>@cluster.mongodb.net/collexa?retryWrites=true&w=majority
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/collexa}
spring.data.mongodb.database=collexa
# Atlas uses TLS by default; the mongodb+srv:// scheme enables it automatically.
# If you see SSL errors, uncomment the next line:
# spring.data.mongodb.ssl.enabled=true

# JWT
jwt.secret=${JWT_SECRET_KEY:collexa-secret-key}
jwt.expiration-days=7

# GROQ AI
groq.api-key=${GROQ_API_KEY:}
groq.model=llama-3.3-70b-versatile

# App
app.domain=@cgcjhanjeri.in

# Logging
logging.level.com.collexa=DEBUG
